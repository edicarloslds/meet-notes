<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <g fill="#FFFFFF" filter="url(#shadow)">
    <rect x="168" y="472" width="56" height="80"  rx="28"/>
    <rect x="272" y="400" width="56" height="224" rx="28"/>
    <rect x="376" y="320" width="56" height="384" rx="28"/>
    <rect x="480" y="232" width="56" height="560" rx="28"/>
    <rect x="584" y="320" width="56" height="384" rx="28"/>
    <rect x="688" y="400" width="56" height="224" rx="28"/>
    <rect x="792" y="472" width="56" height="80"  rx="28"/>
  </g>
</svg>
